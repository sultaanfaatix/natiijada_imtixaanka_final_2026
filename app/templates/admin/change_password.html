{% extends "admin/base.html" %}
{% block page_title %}Change Password{% endblock %}
{% block admin_content %}
<form method="post" class="panel form-grid compact premium-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="section-heading wide"><span><i class="fa-solid fa-key"></i></span><div><h2>Password Security</h2><p>Use a strong password with at least eight characters.</p></div></div><label><i class="fa-solid fa-lock"></i> Current Password<input name="current_password" type="password" required></label><label><i class="fa-solid fa-key"></i> New Password<input name="new_password" type="password" required></label><label><i class="fa-solid fa-check-double"></i> Confirm Password<input name="confirm_password" type="password" required></label><button class="premium"><i class="fa-solid fa-floppy-disk"></i> Change Password</button></form>
{% endblock %}
