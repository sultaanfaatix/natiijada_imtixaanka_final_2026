{% extends "admin/base.html" %}
{% block page_title %}Class Management{% endblock %}
{% block admin_content %}
<form method="post" class="panel form-grid compact premium-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="section-heading wide"><span><i class="fa-solid fa-people-roof"></i></span><div><h2>Add Class</h2><p>Create and maintain school class groups.</p></div></div><label><i class="fa-solid fa-tag"></i> Name<input name="name" required></label><label><i class="fa-solid fa-align-left"></i> Description<input name="description"></label><button class="premium"><i class="fa-solid fa-plus"></i> Add Class</button></form>
<section class="panel"><div class="responsive-table"><table class="premium-table"><thead><tr><th>Name</th><th>Description</th><th>Actions</th></tr></thead><tbody>{% for r in rows %}<tr><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="id" value="{{ r.id }}"><td><input name="name" value="{{ r.name }}"></td><td><input name="description" value="{{ r.description or '' }}"></td><td class="action-cell"><button class="icon-btn small" title="Save"><i class="fa-solid fa-floppy-disk"></i></button></form><form method="post" action="{{ url_for('admin.delete_class', row_id=r.id) }}" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="icon-btn small danger" title="Delete"><i class="fa-solid fa-trash"></i></button></form></td></tr>{% endfor %}</tbody></table></div></section>
{% endblock %}
