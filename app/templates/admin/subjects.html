{% extends "admin/base.html" %}
{% block page_title %}Subject Management{% endblock %}
{% block admin_content %}
<form method="post" class="panel form-grid compact premium-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="section-heading wide"><span><i class="fa-solid fa-book-open"></i></span><div><h2>Add Subject</h2><p>Define subjects and maximum scores.</p></div></div><label><i class="fa-solid fa-book"></i> Name<input name="name" required></label><label><i class="fa-solid fa-star"></i> Max Score<input name="max_score" type="number" step="0.01" value="100"></label><label><i class="fa-solid fa-arrow-down-1-9"></i> Sort Order<input name="sort_order" type="number" value="0"></label><button class="premium"><i class="fa-solid fa-plus"></i> Add Subject</button></form>
<section class="panel"><div class="responsive-table"><table class="premium-table"><thead><tr><th>Name</th><th>Max</th><th>Order</th><th>Actions</th></tr></thead><tbody>{% for r in rows %}<tr><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="id" value="{{ r.id }}"><td><input name="name" value="{{ r.name }}"></td><td><input name="max_score" value="{{ r.max_score }}"></td><td><input name="sort_order" value="{{ r.sort_order }}"></td><td class="action-cell"><button class="icon-btn small" title="Save"><i class="fa-solid fa-floppy-disk"></i></button></form><form method="post" action="{{ url_for('admin.delete_subject', row_id=r.id) }}" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="icon-btn small danger" title="Delete"><i class="fa-solid fa-trash"></i></button></form></td></tr>{% endfor %}</tbody></table></div></section>
{% endblock %}
