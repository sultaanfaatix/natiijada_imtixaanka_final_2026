{% extends "admin/base.html" %}
{% block page_title %}Exam Management{% endblock %}
{% block admin_content %}
<form method="post" class="panel form-grid compact premium-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="section-heading wide"><span><i class="fa-solid fa-file-circle-check"></i></span><div><h2>Create Exam</h2><p>Manage exams and public publishing state.</p></div></div><label><i class="fa-solid fa-heading"></i> Name<input name="name" required></label><label><i class="fa-solid fa-calendar-days"></i> Academic Year<select name="academic_year_id">{% for y in years %}<option value="{{ y.id }}">{{ y.name }}</option>{% endfor %}</select></label><label class="check"><input type="checkbox" name="is_published"> <i class="fa-solid fa-eye"></i> Published</label><button class="premium"><i class="fa-solid fa-plus"></i> Create Exam</button></form>
<section class="panel"><div class="responsive-table"><table class="premium-table"><thead><tr><th>Name</th><th>Year</th><th>Published</th><th>Actions</th></tr></thead><tbody>{% for r in rows %}<tr><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="id" value="{{ r.id }}"><td><input name="name" value="{{ r.name }}"></td><td><select name="academic_year_id">{% for y in years %}<option value="{{ y.id }}" {% if r.academic_year_id==y.id %}selected{% endif %}>{{ y.name }}</option>{% endfor %}</select></td><td><span class="status-pill {{ 'ok' if r.is_published else 'warn' }}"><i class="fa-solid {{ 'fa-eye' if r.is_published else 'fa-eye-slash' }}"></i>{{ "Yes" if r.is_published else "No" }}</span><input type="checkbox" name="is_published" {% if r.is_published %}checked{% endif %}></td><td class="action-cell"><button class="icon-btn small" title="Save"><i class="fa-solid fa-floppy-disk"></i></button></form><form method="post" action="{{ url_for('admin.toggle_exam', row_id=r.id) }}" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="icon-btn small" title="Publish or unpublish"><i class="fa-solid fa-bullhorn"></i></button></form><form method="post" action="{{ url_for('admin.delete_exam', row_id=r.id) }}" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="icon-btn small danger" title="Delete"><i class="fa-solid fa-trash"></i></button></form></td></tr>{% endfor %}</tbody></table></div></section>
{% endblock %}
