{% extends "admin/base.html" %}
{% block page_title %}Academic Year{% endblock %}
{% block admin_content %}
<form method="post" class="panel form-grid compact premium-form"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="section-heading wide"><span><i class="fa-solid fa-calendar-plus"></i></span><div><h2>Add Academic Year</h2><p>Switch the current academic year for new work.</p></div></div><label><i class="fa-solid fa-calendar-days"></i> Name<input name="name" placeholder="2025-2026" required></label><button class="premium"><i class="fa-solid fa-plus"></i> Add Academic Year</button></form>
<section class="panel"><div class="responsive-table"><table class="premium-table"><thead><tr><th>Name</th><th>Current</th><th>Actions</th></tr></thead><tbody>{% for r in rows %}<tr><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="id" value="{{ r.id }}"><td><input name="name" value="{{ r.name }}"></td><td><span class="status-pill {{ 'ok' if r.is_current else 'warn' }}"><i class="fa-solid {{ 'fa-star' if r.is_current else 'fa-calendar' }}"></i>{{ "Current" if r.is_current else "Available" }}</span></td><td class="action-cell"><button class="icon-btn small" title="Save"><i class="fa-solid fa-floppy-disk"></i></button></form><form method="post" action="{{ url_for('admin.switch_year', row_id=r.id) }}" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="icon-btn small" title="Make current"><i class="fa-solid fa-star"></i></button></form><form method="post" action="{{ url_for('admin.delete_academic_year', row_id=r.id) }}" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="icon-btn small danger" title="Delete"><i class="fa-solid fa-trash"></i></button></form></td></tr>{% endfor %}</tbody></table></div></section>
{% endblock %}
