{% extends "admin/base.html" %}
{% block page_title %}{{ "Edit" if student.id else "Add" }} Student{% endblock %}
{% block admin_content %}
<form method="post" enctype="multipart/form-data" class="panel form-grid premium-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="section-heading wide"><span><i class="fa-solid fa-user-graduate"></i></span><div><h2>Student Profile</h2><p>Core identity, academic placement, photo, and result lock status.</p></div></div>
  <label><i class="fa-solid fa-id-card"></i> Student ID<input name="student_code" value="{{ student.student_code or '' }}" required></label>
  <label class="span-2"><i class="fa-solid fa-user-graduate"></i> Full Name<input name="full_name" value="{{ student.full_name or '' }}" required></label>
  <label class="span-2"><i class="fa-solid fa-person-dress"></i> Mother Name<input name="mother_name" value="{{ student.mother_name or '' }}"></label>
  <label><i class="fa-solid fa-people-roof"></i> Class<select name="class_id" required>{% for c in classes %}<option value="{{ c.id }}" {% if student.class_id==c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></label>
  <label><i class="fa-solid fa-calendar-days"></i> Academic Year<select name="academic_year_id" required>{% for y in years %}<option value="{{ y.id }}" {% if student.academic_year_id==y.id %}selected{% endif %}>{{ y.name }}</option>{% endfor %}</select></label>
  <label><i class="fa-solid fa-image"></i> Student Photo<input type="file" name="photo" accept="image/*"></label>
  <label class="wide"><i class="fa-solid fa-message"></i> Special Comment<textarea name="note">{{ student.note or '' }}</textarea></label>
  <label class="wide"><i class="fa-solid fa-triangle-exclamation"></i> Lock Reason<input name="lock_reason" value="{{ student.lock_reason or '' }}" placeholder="Outstanding school fees, missing documents, library fine..."></label>
  <label class="check"><input type="checkbox" name="is_result_locked" {% if student.is_result_locked %}checked{% endif %}> <i class="fa-solid fa-lock"></i> Lock Result</label>
  <label class="check"><input type="checkbox" name="is_active" {% if student.is_active or not student.id %}checked{% endif %}> <i class="fa-solid fa-circle-check"></i> Active Student</label>
  <button class="premium"><i class="fa-solid fa-floppy-disk"></i> Save Student</button>
</form>
{% endblock %}
