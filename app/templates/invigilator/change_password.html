<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Exam Invigilator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }

        .password-container {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
        }

        .password-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .password-header i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .password-header h1 {
            color: #333;
            margin: 0 0 0.5rem 0;
            font-size: 1.8rem;
        }

        .password-header p {
            color: #666;
            margin: 0;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .show-password-check {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            margin-top: .55rem;
            color: #475569;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        .show-password-check input {
            width: 16px;
            height: 16px;
            accent-color: #667eea;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .password-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e0e0e0;
        }

        .password-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .password-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-danger {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .alert-warning {
            background: #ffd;
            color: #963;
            border: 1px solid #fc9;
        }

        .alert-info {
            background: #eef;
            color: #36c;
            border: 1px solid #ccf;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="password-header">
            <i class="fa-solid fa-key"></i>
            <h1>Change Password</h1>
            <p>Update your invigilator password</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('invigilator.change_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required autocomplete="current-password">
                <label class="show-password-check"><input type="checkbox" data-target="current_password"> Show Password</label>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required autocomplete="new-password">
                <label class="show-password-check"><input type="checkbox" data-target="new_password"> Show Password</label>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
                <label class="show-password-check"><input type="checkbox" data-target="confirm_password"> Show Password</label>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-save"></i> Change Password
            </button>
        </form>

        <div class="password-footer">
            <a href="{{ url_for('invigilator.logout') }}">
                <i class="fa-solid fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>
    <script>
      document.querySelectorAll('.show-password-check input').forEach((checkbox) => {
        checkbox.addEventListener('change', () => {
          const input = document.getElementById(checkbox.dataset.target);
          if (input) input.type = checkbox.checked ? 'text' : 'password';
        });
      });
    </script>
</body>
</html>
