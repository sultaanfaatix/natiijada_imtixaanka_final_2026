<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Exam Results{% endblock %}</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <style>
    :root {
      --primary: {{ ui_settings.primary_color or '#002060' }};
      --secondary: {{ ui_settings.secondary_color or '#007bff' }};
      --sidebar: {{ ui_settings.sidebar_color or '#001a4d' }};
    }
  </style>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="toast-stack">
        {% for category, message in messages %}
          <div class="toast {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
