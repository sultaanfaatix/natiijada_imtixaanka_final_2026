<!doctype html>
<html lang="{{ current_language|default('en') }}" dir="{{ text_direction|default('ltr') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Exam Results{% endblock %}</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <style>
    :root {
      --primary: {{ ui_settings.primary_color or '#002060' }};
      --secondary: {{ ui_settings.secondary_color or '#007bff' }};
      --sidebar: {{ ui_settings.sidebar_color or '#001a4d' }};
      --student-photo-size: {{ '74px' if ui_settings.student_photo_size == 'small' else '124px' if ui_settings.student_photo_size == 'large' else '96px' }};
      --student-photo-radius: {{ '18px' if ui_settings.student_photo_shape == 'rounded' else '50%' }};
      --student-photo-border: {{ '1px solid rgba(0,32,96,.16)' if ui_settings.student_photo_border == 'on' else '0' }};
      --student-photo-shadow: {{ '0 14px 30px rgba(0,32,96,.14)' if ui_settings.student_photo_shadow == 'on' else 'none' }};
    }
  </style>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="toast-stack">
        {% for category, message in messages %}
          <div class="toast {{ category }}">{{ _(message) }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
  <script>window.APP_TRANSLATIONS = {{ active_translations|tojson }};</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
